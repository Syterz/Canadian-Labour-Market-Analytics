name: dbt tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dbt
        run: pip install dbt-databricks

      - name: Create dbt profiles directory
        run: mkdir -p ~/.dbt

      - name: Create profiles.yml
        run: |
          cat > ~/.dbt/profiles.yml << EOF
          canada_labour_market_analytics:
            outputs:
              dev:
                type: databricks
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                schema: canada_labour_market
                catalog: workspace
                threads: 1
            target: dev
          EOF

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: Run dbt seed
        working-directory: dbt
        run: dbt seed

      - name: Run dbt models
        working-directory: dbt
        run: dbt run

      - name: Run dbt tests
        working-directory: dbt
        run: dbt test