name: 'canada_labour_market_analytics_dbt'
version: '1.0.0'

# Configures which "profile" dbt uses for this project.
profile: 'canada_labour_market_analytics_dbt'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
models:
  canada_labour_market_analytics_dbt:
    staging:
      +materialized: view
    marts:
      +materialized: table